services:

  db:
    image: postgres:16-alpine
    container_name: digitalsign-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: digitalsign
      POSTGRES_USER: digitalsign
      POSTGRES_PASSWORD: digitalsign123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitalsign"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./DigitalSignature
      dockerfile: Dockerfile
    container_name: digitalsign-backend
    restart: unless-stopped
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/digitalsign
      - SPRING_DATASOURCE_USERNAME=digitalsign
      - SPRING_DATASOURCE_PASSWORD=digitalsign123
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}
      - CORS_ALLOWED_ORIGINS=http://localhost:8080,http://localhost:5173
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    hostname: backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./DigitalSignatureFront
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: digitalsign-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge