services:

  backend:
    build: 
      context: ./DigitalSignature
      dockerfile: Dockerfile
    container_name: digitalsign-backend
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - JAVA_OPTS=-Xms256m -Xmx512m
    networks:
      - app-network
    hostname: backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./DigitalSignatureFront
      dockerfile: Dockerfile
    container_name: digitalsign-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    environment:
      - VITE_API_URL=/api
      
networks:
  app-network:
    driver: bridge